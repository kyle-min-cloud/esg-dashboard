<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대웅그룹 ESG 데이터 제출</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:      #f4f4f0;
    --surface: #ffffff;
    --border:  #e2e2da;
    --text-1:  #1a1a18;
    --text-2:  #5a5a54;
    --text-3:  #9a9a92;
    --green:   #2d6a4f;
    --green-bg:#d8f3dc;
    --red:     #c1121f;
    --red-bg:  #fce4e4;
    --amber:   #b5740a;
    --accent:  #1a1a18;
    --radius:  8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  .header {
    background: var(--accent);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; background: #fff; color: var(--accent); padding: 3px 9px; border-radius: 4px; }
  .header-title { font-size: 15px; font-weight: 500; opacity: 0.9; }

  /* 메인 */
  .main {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 40px;
    width: 100%;
    max-width: 560px;
  }

  /* 스텝 인디케이터 */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 32px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-3);
  }
  .step.active { color: var(--text-1); }
  .step.done   { color: var(--green); }
  .step-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    color: var(--text-3);
  }
  .step.active .step-dot { border-color: var(--accent); background: var(--accent); color: #fff; }
  .step.done   .step-dot { border-color: var(--green);  background: var(--green-bg); color: var(--green); }
  .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; }

  /* 폼 */
  .form-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .form-sub   { font-size: 13px; color: var(--text-2); margin-bottom: 28px; line-height: 1.6; }
  .field      { margin-bottom: 20px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-1); background: var(--surface);
    transition: border-color 0.15s;
    appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 80px; }

  /* 도메인 선택 카드 */
  .domain-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .domain-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
  }
  .domain-card:hover { border-color: var(--accent); }
  .domain-card.selected { border-color: var(--accent); background: #f0f0ec; }
  .domain-card input[type="radio"] { display: none; }
  .domain-label { font-size: 13px; font-weight: 500; }
  .domain-sub   { font-size: 11px; color: var(--text-2); margin-top: 3px; }

  /* 버튼 */
  .btn-primary {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: opacity 0.15s;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 완료 화면 */
  .complete-wrap { text-align: center; padding: 20px 0; }
  .complete-icon {
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--green-bg);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }
  .complete-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .complete-sub   { font-size: 13px; color: var(--text-2); line-height: 1.8; }
  .complete-info  {
    margin-top: 24px;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: left;
  }
  .complete-info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .complete-info-row:last-child { border-bottom: none; }
  .info-label { color: var(--text-2); }
  .info-value { font-weight: 500; }

  /* 반려 배너 */
  .reject-banner {
    background: var(--red-bg);
    border: 1px solid #fca5a5;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--red);
    display: none;
  }
  .reject-banner.visible { display: block; }

  /* 마감일 배너 */
  .deadline-banner {
    background: #fff8e1;
    border: 1px solid #fde68a;
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @media (max-width: 600px) {
    .card { padding: 24px 20px; }
    .domain-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <span class="logo">DAEWOONG GROUP</span>
  <span class="header-title">ESG 데이터 제출</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
    <span id="input-user-badge" style="font-size:11px;font-family:'DM Mono',monospace;opacity:0.6"></span>
    <button onclick="sessionStorage.removeItem('esg_user');location.href='login.html'" style="font-size:11px;font-family:'Noto Sans KR',sans-serif;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;opacity:0.7">로그아웃</button>
  </div>
</header>

<main class="main">
<div class="card">

  <!-- 스텝 인디케이터 -->
  <div class="steps">
    <div class="step active" id="step1-ind">
      <div class="step-dot">1</div>
      <span>담당자 확인</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step2-ind">
      <div class="step-dot">2</div>
      <span>데이터 제출</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step3-ind">
      <div class="step-dot">3</div>
      <span>제출 완료</span>
    </div>
  </div>

  <!-- ── STEP 1: 담당자 확인 ── -->
  <div id="step1">
    <div class="form-title">담당자 확인</div>
    <div class="form-sub">담당 부서와 영역을 선택해 주세요.<br>입력하신 정보는 제출 현황 관리에 사용됩니다.</div>

    <div class="deadline-banner">
      <span>마감일</span>
      <strong id="deadline-text">2026년 5월 11일</strong>
    </div>

    <div class="field">
      <label>법인 선택</label>
      <select id="company-select">
        <option value="">선택해 주세요</option>
        <option value="daewoong_pharma">㈜대웅제약</option>
        <option value="daewoong">㈜대웅</option>
      </select>
    </div>

    <div class="field">
      <label>담당 부서</label>
      <select id="dept-select" disabled>
        <option value="">법인을 먼저 선택해 주세요</option>
      </select>
    </div>

    <div class="field">
      <label>담당자 이름</label>
      <input type="text" id="contact-input" placeholder="성명을 입력해 주세요" disabled />
    </div>

    <button class="btn-primary" id="btn-step1" disabled onclick="goStep2()">다음 단계로</button>
  </div>

  <!-- ── STEP 2: 데이터 제출 ── -->
  <div id="step2" style="display:none">
    <div class="form-title">데이터 제출</div>
    <div class="form-sub" id="step2-sub">담당 영역의 ESG 데이터를 제출해 주세요.</div>

    <div class="reject-banner" id="reject-banner">
      <strong>반려 사유:</strong> <span id="reject-reason-text"></span>
    </div>

    <div class="field">
      <label>제출 영역</label>
      <div class="domain-grid" id="domain-grid"></div>
    </div>

    <div class="field">
      <label>특이사항 (선택)</label>
      <textarea id="note-input" placeholder="데이터 관련 특이사항이 있으면 입력해 주세요 (예: 나보타 신공장 증설로 인한 온실가스 증가 등)"></textarea>
    </div>

    <!-- 세부 항목 폼 (영역 선택 후 표시) -->
    <div id="detail-form-container" style="display:none"></div>

    <button class="btn-primary" id="btn-step2" onclick="submitData()" disabled>제출하기</button>
  </div>

  <!-- ── STEP 3: 완료 ── -->
  <div id="step3" style="display:none">
    <div class="complete-wrap">
      <div class="complete-icon">✓</div>
      <div class="complete-title">제출이 완료되었습니다</div>
      <div class="complete-sub">
        ESG팀에서 내용을 검토한 후 확인 처리합니다.<br>
        반려될 경우 재제출 요청을 드릴 예정입니다.
      </div>
      <div class="complete-info" id="complete-info"></div>
    </div>
  </div>

</div>
</main>

<script>
// ── 인증 가드 ──
const _session = sessionStorage.getItem('esg_user');
if (!_session) { location.href = 'login.html'; }
const _user = _session ? JSON.parse(_session) : {};
document.addEventListener('DOMContentLoaded', () => {
  const badge = document.getElementById('input-user-badge');
  if (badge) badge.textContent = _user.name || '';
});
</script>

<script>
const SUBMISSION_DATA = {
  "meta": { "deadline_1st": "2026-05-11" },
  "departments": [
    { "dept_id": "env_01", "dept_name": "공무팀",    "contact": "이종현", "company": "daewoong_pharma", "domain": "E",   "domain_label": "환경",   "status": "pending", "reject_reason": null },
    { "dept_id": "soc_01", "dept_name": "인재관리팀","contact": "김혜진", "company": "daewoong_pharma", "domain": "S",   "domain_label": "사회",   "status": "pending", "reject_reason": null },
    { "dept_id": "soc_02", "dept_name": "ESG팀",     "contact": "허기석", "company": "daewoong_pharma", "domain": "S",   "domain_label": "사회",   "status": "pending", "reject_reason": null, "note": "산업안전보건 담당" },
    { "dept_id": "gov_01", "dept_name": "IR팀",      "contact": "탁효철", "company": "daewoong_pharma", "domain": "G",   "domain_label": "지배구조","status": "pending", "reject_reason": null },
    { "dept_id": "eco_01", "dept_name": "IR팀",      "contact": "탁효철", "company": "daewoong_pharma", "domain": "ECO", "domain_label": "경제",   "status": "pending", "reject_reason": null },
    { "dept_id": "env_02", "dept_name": "공무팀",    "contact": "이종현", "company": "daewoong",         "domain": "E",   "domain_label": "환경",   "status": "pending", "reject_reason": null },
    { "dept_id": "gov_02", "dept_name": "IR팀",      "contact": "탁효철", "company": "daewoong",         "domain": "G",   "domain_label": "지배구조","status": "pending", "reject_reason": null }
  ]
};

const COMPANY_LABELS = { daewoong_pharma: "㈜대웅제약", daewoong: "㈜대웅" };
const DOMAIN_COLORS  = { E: "#d8f3dc", S: "#dbeafe", G: "#ede9fe", ECO: "#fff3cd" };
const DOMAIN_ICONS   = { E: "🌱", S: "🤝", G: "🏛", ECO: "📊" };

let selectedCompany = "";
let selectedDept    = null;
let selectedDomain  = "";

// 법인 선택 시 부서 목록 갱신
document.getElementById("company-select").addEventListener("change", function() {
  selectedCompany = this.value;
  const deptSel = document.getElementById("dept-select");
  const contactInput = document.getElementById("contact-input");
  deptSel.innerHTML = '<option value="">부서를 선택해 주세요</option>';

  if (!selectedCompany) { deptSel.disabled = true; contactInput.disabled = true; return; }

  const depts = SUBMISSION_DATA.departments.filter(d => d.company === selectedCompany);
  const seen = new Set();
  depts.forEach(d => {
    const key = d.dept_name;
    if (!seen.has(key)) {
      seen.add(key);
      deptSel.innerHTML += `<option value="${key}">${key}</option>`;
    }
  });
  deptSel.disabled = false;
  contactInput.disabled = false;
  checkStep1();
});

document.getElementById("dept-select").addEventListener("change", checkStep1);
document.getElementById("contact-input").addEventListener("input", checkStep1);

function checkStep1() {
  const ok = selectedCompany && document.getElementById("dept-select").value && document.getElementById("contact-input").value.trim();
  document.getElementById("btn-step1").disabled = !ok;
}

function goStep2() {
  const deptName = document.getElementById("dept-select").value;

  // 해당 부서의 담당 영역 목록 구성
  const deptItems = SUBMISSION_DATA.departments.filter(d => d.company === selectedCompany && d.dept_name === deptName);

  // 반려 항목 확인
  const rejected = deptItems.filter(d => d.status === "rejected");

  // 스텝1 → 스텝2
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
  setStep(2);

  const compLabel = COMPANY_LABELS[selectedCompany];
  document.getElementById("step2-sub").textContent = `${compLabel} ${deptName} 담당 영역의 ESG 데이터를 제출해 주세요.`;

  // 반려 배너
  if (rejected.length > 0) {
    document.getElementById("reject-banner").classList.add("visible");
    document.getElementById("reject-reason-text").textContent = rejected.map(d => `[${d.domain_label}] ${d.reject_reason || "재제출 요청"}`).join(" / ");
  }

  // 영역 선택 카드 렌더
  const grid = document.getElementById("domain-grid");
  grid.innerHTML = deptItems.map(d => {
    const bg = DOMAIN_COLORS[d.domain] || "#f4f4f0";
    const icon = DOMAIN_ICONS[d.domain] || "📋";
    const statusLabel = d.status === "submitted" ? "제출완료" : d.status === "confirmed" ? "확인완료" : d.status === "rejected" ? "반려됨" : "미제출";
    const statusColor = d.status === "confirmed" ? "#2d6a4f" : d.status === "submitted" ? "#1d4e89" : d.status === "rejected" ? "#c1121f" : "#9a9a92";
    return `
      <label class="domain-card" style="${d.status !== 'pending' && d.status !== 'rejected' ? 'opacity:0.5;pointer-events:none;' : ''}">
        <input type="radio" name="domain" value="${d.dept_id}" onchange="selectDomain('${d.dept_id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <span style="font-size:18px">${icon}</span>
          <span style="font-size:11px;font-weight:500;color:${statusColor}">${statusLabel}</span>
        </div>
        <div class="domain-label" style="margin-top:8px">${d.domain_label} (${d.domain})</div>
        <div class="domain-sub">${d.item_count}개 항목</div>
      </label>`;
  }).join("");
}

function selectDomain(deptId) {
  selectedDomain = deptId;
  document.querySelectorAll(".domain-card").forEach(c => c.classList.remove("selected"));
  event.currentTarget.classList.add("selected");

  // 세부 항목 폼 렌더
  const formContainer = document.getElementById("detail-form-container");
  if (formContainer) {
    const schema = FORM_SCHEMA[deptId];
    if (schema && schema.sections.length) {
      formValues = {};
      formContainer.style.display = 'block';
      formContainer.innerHTML = `
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
          <div style="font-size:13px;font-weight:500;margin-bottom:16px">2025년 실적 데이터 입력 <span style="font-size:11px;color:var(--text-3);font-weight:400">(2026년 보고서 반영)</span></div>
          ${renderDetailForm(deptId)}
        </div>`;
    } else {
      formContainer.style.display = 'none';
    }
  }
  document.getElementById("btn-step2").disabled = false;
}

// ── 영역별 세부 입력 항목 정의 ──
const FORM_SCHEMA = {
  "env_01": {
    title: "환경(E) — 공무팀",
    sections: [
      { label: "온실가스 배출량", items: [
        { id: "scope1",        label: "Scope1 직접배출",       unit: "tCO2eq",     prev: 11534, required: true },
        { id: "scope2",        label: "Scope2 간접배출(전력)", unit: "tCO2eq",     prev: 30903, required: true },
        { id: "scope1_2_sum",  label: "Scope1+2 합계",         unit: "tCO2eq",     prev: 42437, required: true },
        { id: "ghg_intensity", label: "온실가스 원단위",        unit: "tCO2eq/억원",prev: 3.087, required: false }
      ]},
      { label: "에너지 사용량", items: [
        { id: "energy_lng",       label: "직접에너지 (LNG)",  unit: "TJ",      prev: 210.6,  required: true },
        { id: "energy_oil",       label: "직접에너지 (경유)", unit: "TJ",      prev: 5.1,    required: false },
        { id: "energy_elec",      label: "간접에너지 (전력)", unit: "TJ",      prev: 648.7,  required: true },
        { id: "energy_total",     label: "에너지 사용량 계",  unit: "TJ",      prev: 864.4,  required: true },
        { id: "energy_intensity", label: "에너지 원단위",     unit: "TJ/억원", prev: 0.0621, required: false }
      ]},
      { label: "폐기물", items: [
        { id: "waste_total",    label: "폐기물 발생량 합계", unit: "ton", prev: 985, required: true },
        { id: "waste_recycled", label: "재활용량",           unit: "ton", prev: 501, required: true }
      ]},
      { label: "용수", items: [
        { id: "water_total",  label: "용수 사용량 합계", unit: "ton", prev: 400298, required: true },
        { id: "water_reused", label: "재이용량",         unit: "ton", prev: 40960,  required: true }
      ]},
      { label: "대기오염물질 (대웅그룹 합계)", items: [
        { id: "nox",  label: "NOx",  unit: "ton", prev: 6.776, required: false },
        { id: "sox",  label: "SOx",  unit: "ton", prev: 0.082, required: false },
        { id: "dust", label: "먼지", unit: "ton", prev: 0.447, required: false }
      ]},
      { label: "수질오염물질 (대웅그룹 합계)", items: [
        { id: "toc", label: "TOC", unit: "ton", prev: 5.788, required: false },
        { id: "bod", label: "BOD", unit: "ton", prev: 5.100, required: false },
        { id: "ss",  label: "SS",  unit: "ton", prev: 4.905, required: false }
      ]}
    ]
  },
  "soc_01": {
    title: "사회(S) — 인재관리팀",
    sections: [
      { label: "임직원 현황", items: [
        { id: "emp_total",    label: "임직원 총인원",    unit: "명", prev: 1757, required: true },
        { id: "emp_fulltime", label: "정규직",           unit: "명", prev: 1669, required: true },

let formValues = {};

function renderDetailForm(deptId) {
  const schema = FORM_SCHEMA[deptId];
  if (!schema || !schema.sections.length) return '';
  return schema.sections.map(sec => `
    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:500;color:var(--text-2);letter-spacing:0.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">${sec.label}</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
        ${sec.items.map(item => `
          <div style="margin-bottom:0">
            <label style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px">
              <span>${item.label}${item.required ? ' <span style="color:var(--red)">*</span>' : ''}</span>
              <span style="font-family:DM Mono,monospace;font-size:11px;color:var(--text-3)">전년: ${item.prev.toLocaleString()} ${item.unit}</span>
            </label>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" step="any" id="field_${item.id}" placeholder="입력"
                oninput="formValues['${item.id}']=this.value"
                style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Noto Sans KR',sans-serif"/>
              <span style="font-size:12px;color:var(--text-2);white-space:nowrap;min-width:52px">${item.unit}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function submitData() {
  if (!selectedDomain) return;
  const dept = SUBMISSION_DATA.departments.find(d => d.dept_id === selectedDomain);
  const schema = FORM_SCHEMA[selectedDomain];
  const now = new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
  const contact = document.getElementById("contact-input").value.trim();
  const note = document.getElementById("note-input").value.trim();

  // 필수 항목 검증
  if (schema) {
    const missing = [];
    schema.sections.forEach(sec => sec.items.forEach(item => {
      if (item.required && !formValues[item.id]) missing.push(item.label);
    }));
    if (missing.length > 0) {
      alert(`필수 항목을 입력해 주세요:\n• ${missing.join('\n• ')}`);
      return;
    }
  }

  const isAdmin = _user.role === 'admin';
  const resultStatus = isAdmin ? 'confirmed' : 'submitted';

  // 입력 데이터 수집
  const inputData = {};
  if (schema) {
    schema.sections.forEach(sec => sec.items.forEach(item => {
      if (formValues[item.id] !== undefined && formValues[item.id] !== '') {
        inputData[item.id] = { value: parseFloat(formValues[item.id]), label: item.label, unit: item.unit, prev: item.prev };
      }
    }));
  }

  sessionStorage.setItem('esg_submitted', JSON.stringify({
    dept_id: dept.dept_id, dept_name: dept.dept_name,
    domain: dept.domain, domain_label: dept.domain_label,
    contact, submitted_at: now, status: resultStatus,
    input_data: inputData, note
  }));

  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
  setStep(3);

  // 입력값 요약 테이블
  const inputRows = Object.entries(inputData).map(([k, v]) => {
    const chgPct = v.prev ? ((v.value - v.prev) / v.prev * 100).toFixed(1) : null;
    const chgStyle = chgPct !== null ? (parseFloat(chgPct) > 0 ? 'color:#c1121f' : 'color:#2d6a4f') : '';
    return `<tr>
      <td style="padding:5px 8px;color:var(--text-2)">${v.label}</td>
      <td style="padding:5px 8px;text-align:right;font-family:'DM Mono',monospace">${v.prev.toLocaleString()}</td>
      <td style="padding:5px 8px;text-align:right;font-family:'DM Mono',monospace;font-weight:500">${parseFloat(v.value).toLocaleString()}</td>
      <td style="padding:5px 8px;text-align:right;${chgStyle};font-family:'DM Mono',monospace">${chgPct !== null ? (parseFloat(chgPct)>0?'▲':'▼')+Math.abs(chgPct)+'%' : '—'}</td>
      <td style="padding:5px 8px;color:var(--text-3)">${v.unit}</td>
    </tr>`;
  }).join('');

  const adminNote = isAdmin
    ? `<div style="margin-top:8px;padding:10px 12px;background:#d8f3dc;border-radius:6px;font-size:12px;color:#065f46">Admin 직접 제출 — 자동으로 확인 완료 처리됩니다.</div>`
    : `<div style="margin-top:8px;padding:10px 12px;background:#fff8e1;border-radius:6px;font-size:12px;color:#92400e;line-height:1.7">Admin이 아래 데이터를 검토합니다.<br>취합현황 탭 → 해당 부서 → <strong>Yes</strong>: data.json 반영 / <strong>No</strong>: 반려 후 재입력 요청</div>`;

  document.getElementById("complete-info").innerHTML = `
    <div class="complete-info-row"><span class="info-label">법인</span><span class="info-value">${COMPANY_LABELS[dept.company]}</span></div>
    <div class="complete-info-row"><span class="info-label">부서 / 영역</span><span class="info-value">${dept.dept_name} · ${dept.domain_label}</span></div>
    <div class="complete-info-row"><span class="info-label">담당자</span><span class="info-value">${contact}</span></div>
    <div class="complete-info-row"><span class="info-label">제출 일시</span><span class="info-value">${now}</span></div>
    <div class="complete-info-row"><span class="info-label">상태</span><span class="info-value" style="color:${isAdmin?'var(--green)':'#1d4e89'}">${isAdmin?'✅ 확인 완료':'⏳ Admin 검토 대기'}</span></div>
    ${Object.keys(inputData).length > 0 ? `
      <div style="margin-top:12px">
        <div style="font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:6px">입력 데이터 요약</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:var(--bg)">
            <th style="text-align:left;padding:6px 8px;color:var(--text-2)">항목</th>
            <th style="text-align:right;padding:6px 8px;color:var(--text-2)">전년</th>
            <th style="text-align:right;padding:6px 8px;color:var(--text-2)">입력값</th>
            <th style="text-align:right;padding:6px 8px;color:var(--text-2)">증감</th>
            <th style="text-align:left;padding:6px 8px;color:var(--text-2)">단위</th>
          </tr></thead>
          <tbody>${inputRows}</tbody>
        </table>
      </div>` : ''}
    ${note ? `<div class="complete-info-row" style="margin-top:8px"><span class="info-label">특이사항</span><span class="info-value">${note}</span></div>` : ''}
    ${adminNote}
    <button onclick="location.href='dashboard.html'" style="width:100%;margin-top:16px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer">
      대시보드로 돌아가기
    </button>`;
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const ind = document.getElementById(`step${i}-ind`);
    ind.className = "step" + (i < n ? " done" : i === n ? " active" : "");
    const dot = ind.querySelector(".step-dot");
    dot.textContent = i < n ? "✓" : String(i);
  });
}
</script>
